# This workflow runs on every push and PR to catch issues early.
# It does four things: lint, test imports, health check, and Docker build.

name: CI

# TRIGGER: when does this workflow run?
on:
  push:
    branches: [main]        # Every push to main
  pull_request:
    branches: [main]        # Every PR targeting main

jobs:
  check:
    runs-on: ubuntu-latest  # GitHub provides a fresh Ubuntu VM for each run

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      timescaledb:
        image: timescale/timescaledb:latest-pg16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: specter
          POSTGRES_PASSWORD: specter
          POSTGRES_DB: specter
        options: >-
          --health-cmd "pg_isready -U specter"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      DATABASE_URL: postgresql://specter:specter@localhost:5432/specter

    steps:
      # Step 1: Clone the repo into the runner
      - uses: actions/checkout@v4

      # Step 2: Install Python 3.12
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install uv (the Python package manager we're using)
      - uses: astral-sh/setup-uv@v4

      # Step 4: Install project dependencies via uv
      - run: uv sync --dev

      # Step 4: Lint with ruff — catches syntax errors, bad imports, style issues
      - name: Lint
        run: uv run ruff check app/
      
      # Step 5: Run the Alembic migrations, then run tests
      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Test
        run: uv run pytest tests/ -v

      # Step 6: Start the server in the background, wait for it, hit /health
      - name: Health check
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl --fail http://localhost:8000/health
          kill %1

      # Step 7: Build the Docker image — catches Dockerfile issues
      - name: Docker build
        run: docker build -t specter-cloud .
